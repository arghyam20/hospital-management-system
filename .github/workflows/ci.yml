name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run Linting
      run: pnpm -r run lint --if-present

    - name: Run Type Check
      run: pnpm -r exec tsc --noEmit

    - name: Build All Microservices
      run: pnpm -r run build --if-present

    # In a real environment, you would also add steps to run unit tests and E2E tests here.
    # - name: Run Unit Tests
    #   run: pnpm -r run test --if-present

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    strategy:
      matrix:
        service: [
          'api-gateway', 
          'auth-service', 
          'patient-service', 
          'doctor-service', 
          'appointment-service', 
          'billing-service', 
          'pharmacy-service', 
          'laboratory-service', 
          'notification-service', 
          'audit-service'
        ]
        
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # - name: Login to DockerHub (Uncomment and configure secrets)
    #   uses: docker/login-action@v3
    #   with:
    #     username: ${{ secrets.DOCKERHUB_USERNAME }}
    #     password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: apps/${{ matrix.service }}/Dockerfile
        push: false # Set to true to actually push
        tags: hospital-management-system/${{ matrix.service }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
